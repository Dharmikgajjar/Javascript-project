<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <link rel="icon" href="./favicon/countdown.png" title="Favicon">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Countdown to New Year</h1>
    <div class="year shadow">2027</div>
    <div class="countdown">
        <div>
        <span id="day">00</span>
        <p>Days</p>
    </div>

    <div>
        <span id="hour">00</span>
        <p>Hours</p>
    </div>

    <div>
        <span id="minute">00</span>
        <p>Minutes</p>
    </div>

    <div>
        <span id="second">00</span>
        <p>Seconds</p>
    </div>

    </div>
    <script src="./countdown.js"></script>
</body>
</html>
